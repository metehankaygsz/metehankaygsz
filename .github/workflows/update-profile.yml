name: Update profile README

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-profile.yml"
      - "scripts/generate-profile.mjs"

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate profile README
        run: node scripts/generate-profile.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}

      - name: Commit changed profile data
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "Profile data has not changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh profile README"
          git push
